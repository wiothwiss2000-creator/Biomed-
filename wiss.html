    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-blue: #7e8fc1;
            --dark-blue: #6dc18d;
            --light-blue: #5ca2d0;
            --accent-cyan: #15dee5;
            --white: #ffffff;
            --gray-light: #ffffff;
            --gray-medium: #262f4a;
            --dark: #030407;
            --success: #00c853;
            --warning: #ffab00;
            --danger: #ff1744;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #041734 0%, #e4e9f2 100%);
            min-height: 100vh;
            color: var(--dark);
        }

        /* Header */
        .header {
            /*background: linear-gradient(135deg, var(--primary-blue) 0%, var(--dark-blue) 100%);*/
            color: rgb(255, 253, 253);
            padding: 20px;
            background: #1a1a2e;
            box-shadow: 0 4px 20px rgba(0, 102, 204, 0.3);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            gap: 15px;

        }

        .logo {
            width: 50px;
            height: 50px;
            background: rgb(255, 255, 255);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            box-shadow: 0 4px 10px rgba(23, 111, 134, 0.1);
        }

        .header h1 {
            font-size: 1.8rem;
            font-weight: 600;
            letter-spacing: -0.5px;
        }

        .header span {
            font-weight: 300;
            opacity: 0.9;
        }

        /* Main Container */
        .container {
            max-width: 1400px;
            margin: 30px auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 30px;
        }

        /* Equipment Selection Panel */
        .equipment-panel {
            background: rgb(242, 248, 255);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 40px rgba(0, 102, 204, 0.1);
            height: fit-content;
            position: sticky;
            top: 100px;
        }

        .panel-title {
            font-size: 1.2rem;
            color: var(--primary-blue);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
        }

        .equipment-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .equipment-card {
            background: var(--gray-light);
            border: 2px solid transparent;
            border-radius: 15px;
            padding: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .equipment-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 102, 204, 0.15);
            border-color: var(--accent-cyan);
        }

        .equipment-card.active {
            background: linear-gradient(135deg, var(--primary-blue) 0%, var(--dark-blue) 100%);
            color: white;
            border-color: var(--primary-blue);
            transform: scale(1.02);
        }

        .equipment-icon {
            font-size: 2rem;
            margin-bottom: 8px;
            display: block;
        }

        .equipment-name {
            font-size: 0.85rem;
            font-weight: 600;
            line-height: 1.2;
        }

        .equipment-card.active .equipment-name {
            color: white;
        }

        /* Diagnostic Area */
        .diagnostic-area {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .section-card {
            background: rgb(244, 250, 255);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0, 102, 204, 0.1);
            animation: slideIn 0.4s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .section-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 2px solid var(--light-blue);
        }

        .section-icon {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, var(--light-blue) 0%, #d4e6ff 100%);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            color: var(--primary-blue);
        }

        .section-title {
            flex: 1;
        }

        .section-title h2 {
            color: var(--dark);
            font-size: 1.5rem;
            margin-bottom: 5px;
        }

        .section-title p {
            color: var(--gray-medium);
            font-size: 0.95rem;
        }

        /* Symptoms Input */
        .symptoms-box {
            background: var(--gray-light);
            border-radius: 15px;
            padding: 20px;
            border: 2px solid #e0e6ed;
            transition: border-color 0.3s;
        }

        .symptoms-box:focus-within {
            border-color: var(--accent-cyan);
            box-shadow: 0 0 0 4px rgba(0, 212, 255, 0.1);
        }

        .symptoms-label {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
            color: var(--primary-blue);
            font-weight: 600;
            font-size: 0.95rem;
        }

        textarea {
            width: 100%;
            min-height: 120px;
            border: none;
            background: transparent;
            resize: vertical;
            font-family: inherit;
            font-size: 1rem;
            color: var(--dark);
            outline: none;
        }

        textarea::placeholder {
            color: var(--gray-medium);
        }

        /* Faults List */
        .faults-container {
            display: grid;
            gap: 15px;
        }

        .fault-card {
            background: linear-gradient(135deg, #fff 0%, var(--gray-light) 100%);
            border-left: 4px solid var(--primary-blue);
            border-radius: 12px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .fault-card:hover {
            transform: translateX(5px);
            box-shadow: 0 5px 20px rgba(0, 102, 204, 0.15);
        }

        .fault-card.expanded {
            background: white;
            border-left-color: var(--accent-cyan);
            box-shadow: 0 8px 30px rgba(0, 102, 204, 0.2);
        }

        .fault-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .fault-title {
            font-weight: 600;
            color: var(--dark);
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .fault-code {
            background: var(--primary-blue);
            color: white;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
        }

        .fault-arrow {
            color: var(--gray-medium);
            transition: transform 0.3s;
            font-size: 1.2rem;
        }

        .fault-card.expanded .fault-arrow {
            transform: rotate(180deg);
            color: var(--primary-blue);
        }

        .fault-solution {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px dashed #cbd5e0;
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .fault-card.expanded .fault-solution {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .solution-label {
            color: var(--success);
            font-weight: 700;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .solution-text {
            color: var(--gray-medium);
            line-height: 1.6;
            padding-left: 28px;
        }

        .severity {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 700;
            margin-left: 10px;
            text-transform: uppercase;
        }

        .severity.high { background: #ffebee; color: var(--danger); }
        .severity.medium { background: #fff3e0; color: var(--warning); }
        .severity.low { background: #e8f5e9; color: var(--success); }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--gray-medium);
        }

        .empty-icon {
            font-size: 4rem;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        /* Responsive */
        @media (max-width: 968px) {
            .container {
                grid-template-columns: 1fr;
            }
            
            .equipment-panel {
                position: static;
            }
            
            .equipment-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (max-width: 600px) {
            .equipment-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .section-header {
                flex-direction: column;
                text-align: center;
            }
        }

        /* Tech decorative elements */
        .tech-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
            opacity: 0.03;
            background-image: 
                linear-gradient(90deg, var(--primary-blue) 1px, transparent 1px),
                linear-gradient(var(--primary-blue) 1px, transparent 1px);
            background-size: 50px 50px;
        }

        .pulse {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            background: radial-gradient(circle, rgba(0,212,255,0.1) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .equipment-card.active .pulse {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); }
            100% { opacity: 0; transform: scale(1.5); }
        }
    </style>
</head>

                        solution: '1)Vérifier le papier thermique.<br>2)Nettoyer la tête d\'impression.<br>3)Vérifier l\'état du rouleau et du mécanisme.<br>4)Vérifier les paramètres d\'impression.'
                    },
                    {
                        code: '',
                        title: 'Écran figé / erreur logicielle',
                        severity: 'low',
                        solution: '1)Redémarrer l\'appareil.<br>2)Faire une réinitialisation (reset).<br>3)Vérifier la version du logiciel si possible.'
                    }
                ]
            },
                 
            {
                id: 'incubator',
                name: 'Couveuse Néonatale',
                icon: '👶🏻',
                faults: [
                    {
                        code: '',
                        title: 'Température instable / ne chauffe pas',
                        severity: 'high',
                        solution: '1)Vérifier la résistance chauffante.<br>2) Contrôler le capteur de température (sonde).<br>3) Vérifier la ventilation interne.'
                    },
                    {
                        code: '',
                        title: 'Humidification insuffisante / humidité faible',
                        severity: 'medium',
                        solution: '1)Vérifier le niveau d\'eau dans le réservoir.<br>2)Nettoyer le système d\'humidification.<br>3)Vérifier le capteur d\'humidité. '
                    },
                    {
                        code: '',
                        title: 'Éclairage ne fonctionne pas',
                        severity: 'low',
                        solution: '1)Vérifier la lampe/LED.<br>2)Vérifier les connexions.<br>3)Remplacer l\'ampoule si nécessaire..'
                    }
                ]
            },
           
                  
        ]

        let currentEquipment = null;

        // Initialize
        function init() {
            renderEquipmentGrid();
        }

        // Render equipment grid
        function renderEquipmentGrid() {
            const grid = document.getElementById('equipmentGrid');
            grid.innerHTML = equipmentDB.map(eq => `
                <div class="equipment-card" onclick="selectEquipment('${eq.id}')" id="card-${eq.id}">
                    <div class="pulse"></div>
                    <span class="equipment-icon">${eq.icon}</span>
                    <div class="equipment-name">${eq.name}</div>
                </div>
            `).join('');
        }

        // Select equipment
        function selectEquipment(id) {
            // Update active state
            document.querySelectorAll('.equipment-card').forEach(card => {
                card.classList.remove('active');
            });
            document.getElementById(`card-${id}`).classList.add('active');

            currentEquipment = equipmentDB.find(eq => eq.id === id);
            renderDiagnosticArea();
        }

        // Render diagnostic area
        function renderDiagnosticArea() {
            const area = document.getElementById('diagnosticArea');
            
            if (!currentEquipment) {
                area.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">🔬</div>
                        <h3>Sélectionnez un équipement médical</h3>
                        <p>Choisissez un équipement dans le panneau de gauche pour voir les pannes courantes et solutions</p>
                    </div>
                `;
                return;
            }

            area.innerHTML = `
                <!-- Symptoms Section -->
                <div class="section-card">
                    <div class="section-header">
                        <div class="section-icon">${currentEquipment.icon}</div>
                        <div class="section-title">
                            <h2>${currentEquipment.name}</h2>
                            
                        </div>
                    </div>
                    
                    
                <!-- Faults Section -->
                <div class="section-card">
                    <div class="section-header">
                        <div class="section-icon" style="background: linear-gradient(135deg, #fff3e0 0%, #ffe0b2 100%); color: #ff6f00;">
                            🔧
                        </div>
                        <div class="section-title">
                            <h2>Pannes Courantes & Solutions</h2>
                            <p>Cliquez sur une panne pour voir la procédure de résolution</p>
                        </div>
                    </div>
                    
                    <div class="faults-container">
                        ${currentEquipment.faults.map((fault, index) => `
                            <div class="fault-card" onclick="toggleFault(this)">
                                <div class="fault-header">
                                    <div class="fault-title">
                                        <span>${fault.code}</span>
                                        ${fault.title}
                                        <span class="severity ${fault.severity}">
                                            ${fault.severity === 'high' ? 'CRITIQUE' : fault.severity === 'medium' ? 'MOYEN' : 'FAIBLE'}
                                        </span>
                                    </div>
                                    <div class="fault-arrow">▼</div>
                                </div>
                                <div class="fault-solution">
                                    <div class="solution-label">
                                        <span>✓</span>
                                        Solution / Procédure
                                    </div>
                                    <div class="solution-text">${fault.solution}</div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        // Toggle fault expansion
        function toggleFault(element) {
            // Close others
            document.querySelectorAll('.fault-card').forEach(card => {
                if (card !== element) card.classList.remove('expanded');
            });
            
            // Toggle current
            element.classList.toggle('expanded');
        }

        // Initialize on load
        window.onload = init;
    </script>
</body>
</html>
